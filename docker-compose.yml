networks:
  debezium-net:
    driver: bridge

volumes:
  mysql_primary_data:
  mysql_replica_data:
  kafka_data:
  zookeeper_data:

services:

  # ─────────────────────────────────────────
  #  PRIMARY MySQL  (source of truth)
  # ─────────────────────────────────────────
  mysql-primary:
    image: mysql:8.0
    container_name: mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: app_primary
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./mysql-init/primary:/docker-entrypoint-initdb.d
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --expire_logs_days=1
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    networks:
      - debezium-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  #  REPLICA MySQL  (sync target)
  # ─────────────────────────────────────────
  mysql-replica:
    image: mysql:8.0
    container_name: mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: app_replica
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./mysql-init/replica:/docker-entrypoint-initdb.d
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
    networks:
      - debezium-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  #  ZOOKEEPER  (Kafka dependency)
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - debezium-net

  # ─────────────────────────────────────────
  #  KAFKA  (event streaming backbone)
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - debezium-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  #  KAFKA CONNECT + DEBEZIUM
  # ─────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    networks:
      - debezium-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15

  # ─────────────────────────────────────────
  #  CONNECTOR SETUP  (registers connectors)
  # ─────────────────────────────────────────
  connector-setup:
    image: curlimages/curl:8.5.0
    container_name: connector-setup
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./debezium-config:/config
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/register-connectors.sh"]
    networks:
      - debezium-net

  # ─────────────────────────────────────────
  #  KAFKA-UI  (optional — monitor topics)
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - debezium-net

  # ─────────────────────────────────────────
  #  LARAVEL APP
  # ─────────────────────────────────────────
  laravel:
    build:
      context: ./example-app
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./example-app:/var/www/html
    networks:
      - debezium-net

  laravel-sync-data:
    build:
      context: ./sync-data
      dockerfile: Dockerfile
    container_name: laravel-sync-data
    restart: unless-stopped
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./example-app-v2:/var/www/html
    networks:
      - debezium-net
